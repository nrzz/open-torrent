name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build Windows
        working-directory: app
        run: flutter build windows --release --dart-define=OPENTORRENT_MOCK=true
      - name: Zip Windows portable
        shell: pwsh
        run: |
          Compress-Archive -Path app/build/windows/x64/runner/Release/* -DestinationPath OpenTorrent-windows-x64.zip
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: OpenTorrent-windows-x64.zip

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build APK
        working-directory: app
        run: flutter build apk --release --dart-define=OPENTORRENT_MOCK=true
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

  publish:
    needs: [windows, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            windows-zip/OpenTorrent-windows-x64.zip
            android-apk/app-release.apk
