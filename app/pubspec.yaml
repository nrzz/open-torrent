name: open_torrent
description: Free, ad-free BitTorrent client for Android and Windows.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ffi: ^2.1.3
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  file_picker: ^8.3.7
  url_launcher: ^6.3.1
  http: ^1.3.0
  intl: ^0.20.2
  collection: ^1.19.1
  window_manager: ^0.4.3
  tray_manager: ^0.2.4
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^6.1.3
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
